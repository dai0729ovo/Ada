<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人站点</title>
    <style>
        /* 基础样式复位 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 导航栏 */
        header {
            background: #2c3e50;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 主体内容 */
        <div class="container-split">
    <div class="left-box">
        <h3>左侧：图片/说明</h3>
        <p>这里可以放一些设计草图或者技术参数。</p>
    </div>
    <div class="right-box">
        <h3>右侧：列表/详情</h3>
        <ul>
            <li>特点 A</li>
            <li>特点 B</li>
        </ul>
    </div>
</div>
        main {
            flex: 1;
            width: 90%;
            max-width: 800px;
            margin: 2rem auto;
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        p {
            margin-bottom: 1.5rem;
        }

        /* 按钮样式 */
        .btn {
            display: inline-block;
            background: #3498db;
            color: #fff;
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #2980b9;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到我的新仓库</h1>
    </header>

    <main>
        <h2>你好，世界！</h2>
        <p>这是一个基于 GitHub 构建的基础前端页面。你可以在这里展示你的设计作品、项目文档或者是个人简介。</p>
        <p>这段代码已经内置了响应式设计，在手机和电脑上都能完美显示。</p>
        <a href="#" class="btn" onclick="showMessage()">点击互动</a>
    </main>

    <footer>
        <p>&copy; 2026 我的 GitHub 项目. 保留所有权利。</p>
    </footer>

    <script/* 让这两个盒子左右并排 */
.container-split {
    display: flex; /* 开启弹性布局 */
    gap: 20px;     /* 两个盒子之间的间距 */
    margin-top: 20px;
}

.left-box, .right-box {
    flex: 1;       /* 平分宽度 */
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 5px;
}

/* 手机端自动变成上下堆叠 */
@media (max-width: 600px) {
    .container-split {
        flex-direction: column;
    }
}>
        function showMessage() {
            alert('恭喜！你的第一个网站运行成功了！');
        }
    </script>
</body>
</html>
